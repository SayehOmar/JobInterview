# Use your existing PostgreSQL on the host (same DB you used with `npm run dev`).
# The default docker-compose.yml Postgres container is a SEPARATE server + empty volume.
#
# Run:
#   docker compose -f docker-compose.host-db.yml up --build
#
# Compose reads `.env` next to this file — use the same DATABASE_PASSWORD (and JWT_*) as local dev.
# Docker Desktop (Windows/Mac): host.docker.internal reaches the host.
# Linux (not Docker Desktop): if host.docker.internal fails, add under `api`:
#   extra_hosts:
#     - "host.docker.internal:host-gateway"

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: 0.0.0.0
      WEB_ORIGIN: http://localhost:3000
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-forest_bd_viewer}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_SYNCHRONIZE: "false"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/graphql
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      - api
